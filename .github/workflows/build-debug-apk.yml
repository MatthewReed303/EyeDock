name: Build Debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    # Create a robust mock google-services.json that passes validation
    - name: Create mock google-services.json
      run: |
        mkdir -p app/src/debug
        cat << 'EOF' > app/src/debug/google-services.json
        {
          "project_info": {
            "project_number": "000000000000",
            "firebase_url": "https://mock-project.firebaseio.com",
            "project_id": "mock-project-id",
            "storage_bucket": "mock-project.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:debugmock",
                "android_client_info": {
                  "package_name": "com.eyedock.app.debug"
                }
              },
              "api_key": [
                {
                  "current_key": "AIzaSyDUMMYKEYFORDEBUGBUILDS1234567890"
                }
              ]
            }
          ]
        }
        EOF

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: eyedock-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
