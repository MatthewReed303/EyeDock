name: Build Debug APK (No Google Services)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    # Create a dummy/empty google-services.json to satisfy the plugin (prevents failure)
    # This disables real Google Drive but allows build to complete
    - name: Create dummy google-services.json
      run: |
        mkdir -p app/src/debug
        echo '{}' > app/src/debug/google-services.json  # Empty JSON is enough for debug

    - name: Build debug APK
      run: ./gradlew assembleDebug

    - name: Upload debug APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: eyedock-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
